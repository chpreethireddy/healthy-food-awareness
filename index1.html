<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Health Survey & Safe Fruit Guide</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --secondary-color: #f1f8e9;
            --text-color: #333333;
            --card-background: #ffffff;
            --border-color: #cccccc;
            --accent-color: #ff9800;
            --danger-color: #d32f2f;
            --water-color: #0288d1;
            --fruit-color: #ef6c00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .survey-container {
            max-width: 650px;
            margin: 30px auto;
            background: var(--card-background);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 15px;
        }

        header h1 { color: var(--primary-color); font-size: 1.8rem; margin-bottom: 10px; }

        .form-section { margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.95rem; }
        select, input[type="number"] {
            width: 100%; padding: 11px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 1rem; background-color: #fafafa;
        }

        .lang-box {
            background: #e8f5e9; padding: 15px; border-radius: 8px; border: 1px solid #c8e6c9; margin-bottom: 20px;
        }

        button[type="submit"] {
            display: block; width: 100%; background-color: var(--primary-color); color: white; border: none; padding: 14px; font-size: 1.1rem; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 20px;
        }
        button[type="submit"]:hover { background-color: #1b5e20; }

        .tips-box {
            display: none; margin-top: 25px; padding: 20px; background-color: #fffde7; border-left: 6px solid var(--accent-color); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .tips-box h4 { color: #e65100; margin-bottom: 15px; font-size: 1.3rem; border-bottom: 1px dashed #ffe082; padding-bottom: 5px;}
        .time-row { margin-bottom: 12px; font-size: 1rem; }
        .time-tag { font-weight: bold; color: var(--primary-color); display: inline-block; width: 110px; }

        /* Custom Fruit Guidance Box Styling */
        .fruit-guidance-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #fff3e0;
            border-left: 6px solid var(--fruit-color);
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .fruit-guidance-box h5 { color: var(--fruit-color); font-size: 1.1rem; margin-bottom: 6px; }

        .lifestyle-targets-box {
            margin-top: 15px; padding: 15px; background-color: #e1f5fe; border-left: 6px solid var(--water-color); border-radius: 6px; margin-bottom: 15px;
        }
        .lifestyle-targets-box h5 { color: var(--water-color); font-size: 1.1rem; margin-bottom: 8px; }

        .junk-warning-box {
            margin-top: 20px; padding: 15px; background-color: #ffebee; border-left: 6px solid var(--danger-color); border-radius: 6px;
        }
        .junk-warning-box h5 { color: var(--danger-color); font-size: 1.1rem; margin-bottom: 8px; }
        .junk-warning-box ul { padding-left: 20px; font-size: 0.95rem; }
    </style>
</head>
<body>

    <div class="survey-container">
        <header>
            <h1>Community Health & Lifestyle Survey</h1>
            <p>Fill out the survey to receive personalized food lists, fruit compatibility guides, and life targets!</p>
        </header>

        <div class="lang-box">
            <label for="languageSelect" style="color: var(--primary-color);">🌐 Choose Language / మీ భాషను ఎంచుకోండి / अपनी भाषा चुनें:</label>
            <select id="languageSelect">
                <option value="en">English</option>
                <option value="te">తెలుగు (Telugu)</option>
                <option value="hi">हिंदी (Hindi)</option>
            </select>
        </div>

        <form id="nutritionSurvey" onsubmit="handleSubmit(event)">
            <div class="form-section">
                <div class="form-group">
                    <label for="ageGroup">1. What is your age group?</label>
                    <select id="ageGroup" required>
                        <option value="" disabled selected>Select your age group</option>
                        <option value="Under 18">Under 18</option>
                        <option value="18-24">18 - 24</option>
                        <option value="25-44">25 - 44</option>
                        <option value="45-64">45 - 64</option>
                        <option value="65+">65 or older</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="workHours">2. How many hours do you work daily?</label>
                    <input type="number" id="workHours" min="0" max="24" placeholder="e.g., 8" required>
                </div>

                <div class="form-group">
                    <label for="eatFruits">3. Do you eat fruits daily?</label>
                    <select id="eatFruits" required>
                        <option value="" disabled selected>Select Yes or No</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="waterIntake">4. How much water do you drink per day?</label>
                    <select id="waterIntake" required>
                        <option value="" disabled selected>Select an option</option>
                        <option value="2L">2 Liters (2L)</option>
                        <option value="3L">3 Liters (3L)</option>
                        <option value="4L">4 Liters (4L)</option>
                        <option value="5L and more">5 Liters and more (5L+)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="sleepHours">5. How many hours do you sleep per day?</label>
                    <input type="number" id="sleepHours" min="0" max="24" placeholder="e.g., 7" required>
                </div>

                <div class="form-group">
                    <label for="healthIssue">6. Do you have any existing health issues?</label>
                    <select id="healthIssue" required>
                        <option value="None">None (Healthy Plan)</option>
                        <option value="Sugar">Sugar / Diabetes</option>
                        <option value="BP">High Blood Pressure (BP)</option>
                        <option value="Thyroid">Thyroid</option>
                        <option value="Gastric">Gastric / Acidity Issues</option>
                    </select>
                </div>
            </div>

            <button type="submit">Submit & View My Personalized Advice</button>
        </form>

        <div id="healthTipsBox" class="tips-box">
            <h4 id="tipsTitle">Healthy Daily Food Items</h4>
            
            <div id="lifestyleSection"></div>

            <div id="fruitGuidanceSection"></div>

            <div id="tipsContent"></div>
            <div id="junkFoodSection"></div>
        </div>
    </div>

    <script>
        // Paste your Google Web App URL between the quotes below:
        const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzTh92jKtk4zT7t0zl1oQgQu8PxtzYP-KxIdJ408VDZVSrahza6Lf7IcUkoX3xaY8Vm/exec";

        // MEDICAL CONDITIONS FRUIT TARGETS (Drawn dynamically based on user health choices)
        const fruitGuidanceDatabase = {
            "None": {
                en: { eat: "All seasonal fruits are healthy! Eat Apples, Bananas, Papayas, Watermelons, Pomegranates, and Guavas daily.", avoid: "No restrictions. Avoid eating cut fruits left open in public markets." },
                te: { eat: "అన్ని రకాల పండ్లు ఆరోగ్యకరమైనవే! ఆపిల్, అరటిపండు, బొప్పాయి, పుచ్చకాయ, దానిమ్మ, మరియు జామపండ్లను రోజూ తినవచ్చు.", avoid: "ఎలాంటి నిరోధాలు లేవు. మార్కెట్లో ఎక్కువ సేపు కట్ చేసి బయట పెట్టిన పండ్లను తినవద్దు." },
                hi: { eat: "सभी मौसमी फल स्वास्थ्यवर्धक हैं! सेब, केला, पपीता, तरबूज, अनार और अमरूद रोज खाएं।", avoid: "कोई प्रतिबंध नहीं है। बाजार में खुले कटे हुए फलों को खाने से बचें।" }
            },
            "Sugar": {
                en: { eat: "Guava (Jamapandu), Jamun (Neredu), Green Apples, Papaya. These contain low sugar and natural fiber.", avoid: "Strictly avoid Mangoes, Grapes, Custard Apples (Seethaphal), and Sapota. They spike blood sugar instantly." },
                te: { eat: "జామపండు, నేరేడు పండు, పచ్చని ఆపిల్స్, బొప్పాయి. వీటిలో చక్కెర తక్కువగా ఉండి పీచుపదార్థం ఎక్కువగా ఉంటుంది.", avoid: "మామిడి పండ్లు, ద్రాక్ష, సీతాఫలం, మరియు సపోటా అస్సలు తినవద్దు. ఇవి షుగర్ లెవెల్స్‌ను వెంటనే పెంచుతాయి." },
                hi: { eat: "अमरूद, जामुन, हरा सेब, और पपीता। इनमें चीनी कम होती है और फाइबर अधिक होता है जो शुगर नियंत्रित रखता है।", avoid: "आम, अंगूर, सीताफल, और चीकू (सपोटा) खाने से पूरी तरह बचें। ये खून में शुगर की मात्रा तुरंत बढ़ाते हैं।" }
            },
            "BP": {
                en: { eat: "Bananas, Watermelon, Oranges, Pomegranates. They are rich in potassium which lowers blood pressure.", avoid: "Avoid preserved fruit juices or canned fruits containing artificial sodium and chemical salts." },
                te: { eat: "అరటిపండ్లు, పుచ్చకాయ, నారింజ/బత్తాయి, దానిమ్మ. వీటిలో పొటాషియం ఎక్కువగా ఉండి బీపీని తగ్గిస్తుంది.", avoid: "నిల్వ ఉంచిన పండ్ల రసాలు (ప్యాకెట్ జ్యూస్) లేదా ప్రిజర్వేటివ్స్ ఉన్న డబ్బా పండ్లను తినకూడదు." },
                hi: { eat: "केला, तरबूज, संतरा, और अनार। इनमें पोटैशियम भरपूर मात्रा में होता है जो हाई बीपी को कम करने में मदद करता है।", avoid: "डिब्बाबंद फ्रूट जूस या केमिकल सॉल्ट वाले डिब्बाबंद फलों से पूरी तरह दूर रहें।" }
            },
            "Thyroid": {
                en: { eat: "Apples, Berries, Oranges, Avocados, and Pineapple. They contain zinc and selenium which improve thyroid health.", avoid: "Avoid unwashed raw fruits or excessive consumption of highly processed sweet fruit syrups." },
                te: { eat: "ఆపిల్, బెర్రీలు, నారింజ, మరియు అనాస పండు (పైpineapple). ఇవి థైరాయిడ్ గ్రంధి పనితీరును మెరుగుపరుస్తాయి.", avoid: "సరిగ్గా కడగని పండ్లు మరియు కృత్రిమంగా తయారుచేసిన తీపి ఫ్రూట్ సిరప్‌లను తీసుకోకూడదు." },
                hi: { eat: "सेब, जामुन/बेरीज, संतरा, और अनानास। इनमें जिंक और सेलेनियम होता है जो थायराइड ग्रंथि को संतुलित रखता है।", avoid: "बिना धुले फल और फैक्ट्रियों में बने मीठे फ्रूट सिरप का सेवन न करें।" }
            },
            "Gastric": {
                en: { b: "Papaya, Bananas, Melons. These fruits are alkaline and soothe stomach acid linings.", avoid: "Strictly avoid Oranges, Lemons, Sweet Limes (Mosambi), and Pineapples. Highly acidic fruits cause severe stomach burning." },
                te: { eat: "బొప్పాయి, అరటిపండ్లు, పుచ్చకాయ. ఈ పండ్లు కడుపులో మంటను తగ్గించి జీర్ణక్రియను సులభతరం చేస్తాయి.", avoid: "నారింజ, నిమ్మకాయ, బత్తాయి, మరియు అనాస పండు (పైpineapple) అస్సలు తినవద్దు. ఇవి కడుపులో యాసిడ్లను పెంచి మంటను కలిగిస్తాయి." },
                hi: { eat: "पपीता, केला, और खरबूजा/तरबूज। ये फल पेट को ठंडक पहुंचाते हैं और एसिडिटी को शांत करते हैं।", avoid: "संतरा, नींबू, मौसंबी, और अनानास खाने से बचें। अत्यधिक खट्टे फल पेट में तेजाब और जलन बढ़ाते हैं।" }
            }
        };

        const lifestyleDatabase = {
            "Under 18": {
                en: { water: "2L to 3L per day (Essential for high metabolism and growth activity).", sleep: "8 to 10 hours per day (Crucial for physical development and brain recovery)." },
                te: { water: "రోజుకు 2 నుండి 3 లీటర్లు (శరీర ఎదుగుదలకు మరియు జీర్ణక్రియకు చాలా అవసరం).", sleep: "రోజుకు 8 నుండి 10 గంటలు (శరీర వికాసానికి మరియు మెదడు చురుకుదనానికి ముఖ్యం)." },
                hi: { water: "2 से 3限制 लीटर प्रतिदिन (शारीरिक विकास और मेटाबॉलिज्म के लिए बहुत जरूरी है)।", sleep: "8 से 10 घंटे प्रतिदिन (शारीरिक वृद्धि और मानसिक स्वास्थ्य के लिए आवश्यक)।" }
            },
            "18-24": {
                en: { water: "3L to 4L per day (Keeps energy high and flushes toxins during long study/work hours).", sleep: "7 to 9 hours per day (Maintains focus, memory, and reduces high daily stress)." },
                te: { water: "రోజుకు 3 నుండి 4 లీటర్లు (శరీరానికి शक्तिని ఇస్తుంది మరియు వ్యర్థాలను తొలగిస్తుంది).", sleep: "రోజుకు 7 నుండి 9 గంటలు (ఏకాగ్రత పెంచడానికి మరియు ఒత్తిడిని తగ్గించడానికి అవసరం)." },
                hi: { water: "3 से 4 लीटर प्रतिदिन (ऊर्जा बनाए रखने और शरीर से हानिकारक तत्वों को बाहर निकालने के लिए)।", sleep: "7 से 9 घंटे प्रतिदिन (तनाव कम करने और ध्यान केंद्रित करने के लिए जरूरी)।" }
            },
            "25-44": {
                en: { water: "3L to 4L per day (Protects joint lubrication and helps control sudden food cravings).", sleep: "7 to 8 hours per day (Vital for maintaining standard metabolism and cellular repair)." },
                te: { water: "రోజుకు 3 నుండి 4 లీటర్లు (కీళ్ల నొప్పులు రాకుండా కాపాడుతుంది మరియు బరువును అదుపులో ఉంచుతుంది).", sleep: "రోజుకు 7 నుండి 8 గంటలు (జీవక్రియ సజావుగా సాగడానికి మరియు అలసట తగ్గడానికి అవసరం)." },
                hi: { water: "3 से 4 लीटर प्रतिदिन (जोड़ों को स्वस्थ रखने और अचानक भूख लगने की आदत को नियंत्रित करने के लिए)।", sleep: "7 से 8 घंटे प्रतिदिन (मेटाबॉलिज्म को ठीक रखने और शरीर की मरम्मत के लिए)।" }
            },
            "45-64": {
                en: { water: "2.5L to 3.5L per day (Supports kidney health and processes balanced blood pressure).", sleep: "7 to 8 hours per day (Protects long-term cardiovascular and heart performance)." },

                hi: { water: "2.5 से 3.5 लीटर प्रतिदिन (किडनी को स्वस्थ रखने और ब्लड प्रेशर को नियंत्रित करने में सहायक)।", sleep: "7 से 8 घंटे प्रतिदिन (दिल की सेहत दुरुस्त रखने और लंबी उम्र के लिए ज़रूरी)।" }

            "65+": {
                en: { water: "2L to 2.5L per day (Drink in small intervals even if not explicitly thirsty to prevent dizziness).", sleep: "7 hours per day (Improves immune defenses and prevents early morning fatigue)." },
                te: { water: "రోజుకు 2 నుండి 2.5 లీటర్లు (దాహం వేయకపోయినా కొద్దికొద్దిగా తాగుతూ ఉండాలి, తలతిరగడం తగ్గుతుంది).", sleep: "రోజుకు 7 గంటలు (రోగనిరోధక శక్తిని పెంచడానికి మరియు ఉదయం అలసట లేకుండా ఉండటానికి అవసరం)." },
                hi: { water: "2 से 2.5 लीटर प्रतिदिन (प्यास न लगने पर भी थोड़े-थोड़े समय में पानी पीते रहें ताकि कमजोरी न आए)।", sleep: "7 घंटे प्रतिदिन (रोग प्रतिरोधक क्षमता बढ़ाने और सुबह की थकान से बचने के लिए आवश्यक)।" }
            }
        };

        const healthConditionPlans = {

                    <div style="font-size: 0.95rem; margin-top: 5px;"><strong>😴 ${labels[selectedLang][1]}:</strong> ${lifestyle.sleep}</div>
                </div>
            `;

            // INJECT DYNAMIC SAFEST FRUITS INFORMATION
            const fruits = fruitGuidanceDatabase[healthIssue][selectedLang];
            const fruitHeadings = { en: "Fruit Compatibility Guide", te: "పండ్ల వినియోగ మార్గదర్శకాలు", hi: "फलों के सेवन के नियम" };
            const subTags = { en: ["✅ Best Fruits to Eat", "❌ Fruits to STRICTLY Avoid"], te: ["✅ తినవలసిన మంచి పండ్లు", "❌ అస్సలు తినకూడని పండ్లు"], hi: ["✅ खाने के लिए सबसे अच्छे फल", "❌ खाने से पूरी तरह बचने वाले फल"] };

            document.getElementById("fruitGuidanceSection").innerHTML = `
                <div class="fruit-guidance-box">
                    <h5>🍊 ${fruitHeadings[selectedLang]} (${healthIssue === 'None' ? 'General' : healthIssue})</h5>
                    <div style="font-size: 0.95rem; margin-top: 5px; color: #1b5e20;"><strong>${subTags[selectedLang][0]}:</strong> ${fruits.eat}</div>
                    <div style="font-size: 0.95rem; margin-top: 5px; color: #b71c1c;"><strong>${subTags[selectedLang][1]}:</strong> ${fruits.avoid}</div>
                </div>
            `;

            // Setup proper food selection display logic
            let food;
            let displayTitle = "";
            const titles = {
                en: { healthy: "Healthy Daily Food Items", medical: "Medical Dietary Recommendations" },
                te: { healthy: "సిఫార్సు చేయబడిన రోజువారీ ఆహారం", medical: "వైద్య ఆరోగ్య ఆహార నియమాలు" },
                hi: { healthy: "अनुशंसित दैनिक भोजन", medical: "चिकित्सीय आहार संबंधी सिफारिशें" }
            };

            if (healthIssue === "None") {
                food = healthyFoodDatabase[ageGroup][selectedLang];
                displayTitle = `${titles[selectedLang].healthy} (${ageGroup})`;
            } else {
                food = healthConditionPlans[healthIssue][selectedLang];
                displayTitle = `${titles[selectedLang].medical} - ${healthIssue} Plan`;
            }

            const mealLabels = {
                en: ["Breakfast", "Lunch", "Snack", "Dinner"],
                te: ["ఉదయపు ఆహారం", "మధ్యాహ్న భోజనం", "సాయంత్రం ఆహారం", "రాత్రి భోజనం"],
                hi: ["सुबह का नाश्ता", "दोपहर का भोजन", "शाम का नाश्ता", "रात का भोजन"]
            };

            document.getElementById("tipsTitle").innerText = displayTitle;
            document.getElementById("tipsContent").innerHTML = `
                <div class="time-row"><span class="time-tag">🍳 ${mealLabels[selectedLang][0]}:</span> ${food.b}</div>
                <div class="time-row"><span class="time-tag">🍛 ${mealLabels[selectedLang][1]}:</span> ${food.l}</div>
                <div class="time-row"><span class="time-tag">🍎 ${mealLabels[selectedLang][2]}:</span> ${food.s}</div>
                <div class="time-row"><span class="time-tag">🌙 ${mealLabels[selectedLang][3]}:</span> ${food.d}</div>
            `;
            
            const junk = junkFoodInfo[selectedLang];
            let bulletPoints = "";
            junk.causes.forEach(cause => { bulletPoints += `<li>${cause}</li>`; });
            
            document.getElementById("junkFoodSection").innerHTML = `
                <div class="junk-warning-box">
                    <h5>${junk.title}</h5>
                    <p style="margin-bottom: 8px; font-weight: 500;">${junk.intro}</p>
                    <ul>${bulletPoints}</ul>
                </div>
            `;

            const tipsBox = document.getElementById("healthTipsBox");
            tipsBox.style.display = "block";

            try {
                if(BACKEND_URL !== "YOUR_GOOGLE_WEB_APP_URL_HERE") {
                    await fetch(BACKEND_URL, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(formData)
                    });
                }
            } catch (error) {
                console.error("Error saving data:", error);
            } finally {
                document.getElementById("nutritionSurvey").reset();
                submitBtn.innerText = "Submit & View My Personalized Advice";
                submitBtn.disabled = false;
                tipsBox.scrollIntoView({ behavior: 'smooth' });
            }
        }
    </script>

</body>
</html>
